# Agent Hub — Application Configuration
#
# Guidelines:
#   - Copy this file to config.yaml and customize for your environment
#   - Environment variables are supported: api_key: $OPENAI_API_KEY
#   - The "use" field follows Python import notation: package.module:ClassName

config_version: 1


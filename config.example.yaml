# ============================================================================
# Pipeline Configuration
# ============================================================================

pipeline:
  default_stages:
    - planning
    - architecture
    - implementation
    - testing
    - review
    - deployment

  maturation_layers:
    - planner
    - memory
    - tools
    - llm
    - self_verify
    - guardrails
    - observability
    - memory_store

# ============================================================================
# Skills Configuration
# ============================================================================
# Skills directory for agent workflows

skills:
  path: ../skills
  categories:
    - public
    - custom

# ============================================================================
# Memory Configuration
# ============================================================================

memory:
  enabled: true
  working_memory_ttl: 3600
  max_long_term_entries: 1000
  max_injection_tokens: 2000
  pattern_confidence_threshold: 0.7

# ============================================================================
# Gateway Channels
# ============================================================================

# channels:
#   feishu:
#     enabled: false
#     app_id: $FEISHU_APP_ID
#     app_secret: $FEISHU_APP_SECRET
#   qq:
#     enabled: false
#     app_id: $QQ_APP_ID
#     token: $QQ_TOKEN

# ============================================================================
# Executor Configuration
# ============================================================================

executor:
  allowed_dirs:
    - /tmp/agent-hub
  timeout_seconds: 300
